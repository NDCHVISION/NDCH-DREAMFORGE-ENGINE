<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Reasoning Capture — NDCH DreamForge</title>
  <style>
    :root {
      --black:   #1A1A1A;
      --gold:    #C6A94F;
      --bone:    #F5F2EB;
      --crimson: #DC143C;
      --dark:    #111111;
      --mid:     #242424;
      --border:  #2E2E2E;
      --success: #2D9C5A;
      --warn-bg: #3A1F1F;
      --warn-border: #8B3A3A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--bone);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-mark {
      width: 34px; height: 34px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--gold);
    }
    .logo-text { font-size: 14px; font-weight: 700; letter-spacing: 1.5px; }
    .logo-sub  { font-size: 9px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }

    .container { max-width: 780px; margin: 0 auto; padding: 36px 24px 60px; }

    h1 { font-size: 22px; font-weight: 700; color: var(--bone); margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; letter-spacing: 0.3px; }

    /* ── AI enrichment banner ── */
    .ai-banner {
      display: none;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.5;
    }
    .ai-banner.error {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      color: #F5A0A0;
    }
    .ai-banner.success {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #1A2E23;
      border: 1px solid #2D9C5A;
      color: #80D4A0;
    }
    .banner-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .banner-body { flex: 1; }
    .banner-title { font-weight: 700; margin-bottom: 2px; }
    .banner-msg   { font-size: 13px; opacity: 0.9; }
    .btn-retry {
      margin-top: 10px;
      background: transparent;
      border: 1px solid #8B3A3A;
      color: #F5A0A0;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }
    .btn-retry:hover { background: rgba(139,58,58,0.25); }

    /* ── Form ── */
    .form-section { margin-bottom: 28px; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    label .req { color: var(--crimson); margin-left: 2px; }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      background: var(--mid);
      border: 1px solid var(--border);
      color: var(--bone);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    textarea:focus,
    select:focus { border-color: var(--gold); }
    textarea { resize: vertical; min-height: 88px; }
    input[type="text"]::placeholder,
    textarea::placeholder { color: #555; }

    /* AI-enriched fields get a subtle highlight when populated by AI */
    .ai-populated { border-color: var(--gold) !important; }

    /* ── AI Enrich button ── */
    .enrich-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .btn-enrich {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .btn-enrich:hover:not(:disabled) { background: rgba(198,169,79,0.12); }
    .btn-enrich:disabled { opacity: 0.45; cursor: not-allowed; }
    .enrich-note { font-size: 12px; color: #666; }

    /* ── Save button ── */
    .save-row { margin-top: 32px; display: flex; gap: 12px; align-items: center; }
    .btn-save {
      background: var(--gold);
      color: var(--dark);
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }
    .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-save:hover:not(:disabled) { opacity: 0.88; }
    .save-hint { font-size: 12px; color: #666; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(198,169,79,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">ND</div>
  <div>
    <div class="logo-text">NDCH DreamForge</div>
    <div class="logo-sub">Clinical Intelligence</div>
  </div>
</header>

<main class="container">
  <h1>Clinical Reasoning Capture</h1>
  <p class="subtitle">Record and AI-enrich your clinical reasoning before saving to the case log.</p>

  <!--
    AI enrichment status banner.
    role="alert" makes it announce to assistive tech as soon as content changes.
    aria-live="assertive" covers AT that inspect role=alert lazily.
  -->
  <div
    id="ai-banner"
    class="ai-banner"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  >
    <span class="banner-icon" id="banner-icon" aria-hidden="true"></span>
    <div class="banner-body">
      <div class="banner-title" id="banner-title"></div>
      <div class="banner-msg"  id="banner-msg"></div>
      <button class="btn-retry" id="btn-retry" hidden aria-label="Retry AI enrichment">
        ↻ Retry enrichment
      </button>
    </div>
  </div>

  <form id="crc-form" novalidate>

    <!-- ── Encounter context ── -->
    <div class="form-section">
      <div class="section-label">Encounter Context</div>
      <div class="field">
        <label for="patient-id">Patient ID / MRN</label>
        <input type="text" id="patient-id" name="patientId" placeholder="e.g. MRN-000123" />
      </div>
      <div class="field">
        <label for="encounter-date">Date of encounter</label>
        <input type="text" id="encounter-date" name="encounterDate" placeholder="YYYY-MM-DD" />
      </div>
    </div>

    <!-- ── Clinical reasoning (required) ── -->
    <div class="form-section">
      <div class="section-label">Clinical Reasoning <span style="color:var(--crimson)">*</span></div>

      <div class="field">
        <label for="chief-complaint">Chief Complaint <span class="req">*</span></label>
        <input
          type="text"
          id="chief-complaint"
          name="chiefComplaint"
          required
          aria-required="true"
          placeholder="Primary presenting symptom or concern"
        />
      </div>

      <div class="field">
        <label for="assessment">Assessment / Working Diagnosis <span class="req">*</span></label>
        <textarea
          id="assessment"
          name="assessment"
          required
          aria-required="true"
          placeholder="Differential or confirmed diagnosis with clinical rationale"
        ></textarea>
      </div>

      <div class="field">
        <label for="plan">Plan / Treatment <span class="req">*</span></label>
        <textarea
          id="plan"
          name="plan"
          required
          aria-required="true"
          placeholder="Investigations ordered, medications, referrals, follow-up"
        ></textarea>
      </div>
    </div>

    <!-- ── AI enrichment ── -->
    <div class="form-section">
      <div class="section-label">AI Enrichment (Gemini)</div>
      <div class="enrich-row">
        <button
          type="button"
          class="btn-enrich"
          id="btn-enrich"
          aria-label="Enrich with AI"
        >
          <span class="enrich-icon">✦</span>
          Enrich with AI
        </button>
        <span class="enrich-note">Uses Gemini to suggest evidence-based additions</span>
      </div>
      <div class="field">
        <label for="ai-suggestions">AI Suggestions</label>
        <textarea
          id="ai-suggestions"
          name="aiSuggestions"
          readonly
          placeholder="AI-generated enrichment will appear here after enrichment runs"
          aria-live="polite"
        ></textarea>
      </div>
    </div>

    <!-- ── Save ── -->
    <div class="save-row">
      <button type="submit" class="btn-save" id="btn-save" disabled>
        Save to Case Log
      </button>
      <span class="save-hint" id="save-hint">Complete required fields to enable save</span>
    </div>

  </form>
</main>

<script>
  /* ── Config ── */
  const GEMINI_ENDPOINT = '/api/gemini-enrich';
  const ENRICHMENT_AUDIT_ENDPOINT = '/api/enrichment-audit';
  const ENRICHMENT_MODEL = 'gemini';
  const ENRICHMENT_TIMEOUT_MS = 8_000;
  const ENRICHMENT_MAX_RETRIES = 3;
  const ENRICHMENT_CONFIDENCE_THRESHOLD = 0.7;
  const SAFE_UNAVAILABLE_MESSAGE = 'AI output unavailable — review source.';

  /* ── DOM refs ── */
  const form          = document.getElementById('crc-form');
  const btnEnrich     = document.getElementById('btn-enrich');
  const btnRetry      = document.getElementById('btn-retry');
  const btnSave       = document.getElementById('btn-save');
  const saveHint      = document.getElementById('save-hint');
  const banner        = document.getElementById('ai-banner');
  const bannerIcon    = document.getElementById('banner-icon');
  const bannerTitle   = document.getElementById('banner-title');
  const bannerMsg     = document.getElementById('banner-msg');
  const aiSuggestions = document.getElementById('ai-suggestions');

  const REQUIRED_IDS = ['chief-complaint', 'assessment', 'plan'];

  function refreshSaveState() {
    const allFilled = REQUIRED_IDS.every((id) => {
      const el = document.getElementById(id);
      return el && el.value.trim().length > 0;
    });

    btnSave.disabled = !allFilled;
    saveHint.textContent = allFilled
      ? 'All required fields completed'
      : 'Complete required fields to enable save';
  }

  REQUIRED_IDS.forEach((id) => {
    document.getElementById(id).addEventListener('input', refreshSaveState);
  });

  function hideBanner() {
    banner.className = 'ai-banner';
    bannerIcon.textContent = '';
    bannerTitle.textContent = '';
    bannerMsg.textContent = '';
    btnRetry.hidden = true;
  }

  function showError(title, msg, showRetry = true) {
    banner.className = 'ai-banner error';
    bannerIcon.textContent = '⚠';
    bannerTitle.textContent = title;
    bannerMsg.textContent = msg;
    btnRetry.hidden = !showRetry;
  }

  function showSuccess(msg) {
    banner.className = 'ai-banner success';
    bannerIcon.textContent = '✓';
    bannerTitle.textContent = 'AI enrichment applied';
    bannerMsg.textContent = msg;
    btnRetry.hidden = true;
  }

  function buildRequestId() {
    const random = Math.random().toString(16).slice(2, 10);
    return `enrich-${Date.now()}-${random}`;
  }

  function makeEnrichmentError(name, message, options = {}) {
    const err = new Error(message);
    err.name = name;
    Object.assign(err, options);
    return err;
  }

  function isRecord(value) {
    return Boolean(value) && typeof value === 'object' && !Array.isArray(value);
  }

  function looksTruncated(text) {
    const trimmed = String(text || '').trim();
    if (!trimmed) return false;
    if (/premature\s*close|premature\s*closure|unexpected end of json/i.test(trimmed)) return true;
    const openCurly = (trimmed.match(/\{/g) || []).length;
    const closeCurly = (trimmed.match(/\}/g) || []).length;
    return (trimmed.startsWith('{') && !trimmed.endsWith('}')) || openCurly > closeCurly;
  }

  function validateStructuredOutput(payload) {
    if (!isRecord(payload)) {
      throw makeEnrichmentError('EnrichmentParseError', 'Enrichment payload must be an object');
    }

    const keys = Object.keys(payload);
    const allowedKeys = ['suggestion', 'confidence', 'tokenUsage', 'model', 'status', 'error'];
    if (keys.some((key) => !allowedKeys.includes(key))) {
      throw makeEnrichmentError('EnrichmentParseError', 'Unexpected enrichment fields');
    }

    if (payload.status === 'partial') {
      return { status: 'partial' };
    }

    if (typeof payload.suggestion !== 'string' || payload.suggestion.trim().length === 0) {
      throw makeEnrichmentError('EnrichmentParseError', 'suggestion must be a non-empty string');
    }
    if (typeof payload.confidence !== 'number' || payload.confidence < 0 || payload.confidence > 1) {
      throw makeEnrichmentError('EnrichmentParseError', 'confidence must be between 0 and 1');
    }

    let tokenUsage = null;
    if (payload.tokenUsage !== undefined) {
      if (!isRecord(payload.tokenUsage)) {
        throw makeEnrichmentError('EnrichmentParseError', 'tokenUsage must be an object');
      }

      const tokenKeys = Object.keys(payload.tokenUsage);
      const allowedTokenKeys = ['promptTokens', 'completionTokens', 'totalTokens'];
      if (tokenKeys.some((key) => !allowedTokenKeys.includes(key))) {
        throw makeEnrichmentError('EnrichmentParseError', 'tokenUsage contains unexpected fields');
      }

      if (
        typeof payload.tokenUsage.promptTokens !== 'number'
        || typeof payload.tokenUsage.completionTokens !== 'number'
        || typeof payload.tokenUsage.totalTokens !== 'number'
      ) {
        throw makeEnrichmentError('EnrichmentParseError', 'tokenUsage fields must be numbers');
      }

      tokenUsage = {
        promptTokens: payload.tokenUsage.promptTokens,
        completionTokens: payload.tokenUsage.completionTokens,
        totalTokens: payload.tokenUsage.totalTokens,
      };
    }

    return {
      status: 'complete',
      suggestion: payload.suggestion,
      confidence: payload.confidence,
      model: typeof payload.model === 'string' ? payload.model : ENRICHMENT_MODEL,
      tokenUsage,
    };
  }

  function mapErrorToUi(err) {
    if (err?.name === 'EnrichmentTimeoutError') {
      return {
        title: 'AI enrichment timed out',
        message: 'AI enrichment timed out. Please retry.',
        showRetry: true,
        errorClass: err.name,
      };
    }
    if (err?.name === 'EnrichmentRateLimitError') {
      return {
        title: 'AI enrichment unavailable',
        message: 'Gemini billing quota depleted — switch to a free-tier key or top up the project.',
        showRetry: true,
        errorClass: err.name,
      };
    }
    if (err?.name === 'EnrichmentUpstreamError') {
      return {
        title: 'AI enrichment failed',
        message: 'AI enrichment service is temporarily unavailable. Please retry.',
        showRetry: true,
        errorClass: err.name,
      };
    }
    if (err?.name === 'EnrichmentParseError') {
      return {
        title: err.partial ? 'AI enrichment partial' : 'AI enrichment unavailable',
        message: SAFE_UNAVAILABLE_MESSAGE,
        showRetry: Boolean(err.partial),
        errorClass: err.name,
      };
    }

    return {
      title: 'AI enrichment unavailable',
      message: SAFE_UNAVAILABLE_MESSAGE,
      showRetry: false,
      errorClass: 'UnknownEnrichmentError',
    };
  }

  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  function backoffDelayMs(attempt) {
    return 250 * (2 ** (attempt - 1));
  }

  async function fetchWithTimeout(url, options, timeoutMs) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), timeoutMs);

    try {
      return await fetch(url, {
        ...options,
        signal: controller.signal,
      });
    } catch (error) {
      if (error?.name === 'AbortError') {
        throw makeEnrichmentError('EnrichmentTimeoutError', `Timed out after ${timeoutMs}ms`);
      }
      throw error;
    } finally {
      clearTimeout(timeout);
    }
  }

  async function writeAuditEntry(payload) {
    const endpoint = document.body.dataset.enrichmentAuditEndpoint || ENRICHMENT_AUDIT_ENDPOINT;

    try {
      await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          collection: 'enrichment_audit',
          ...payload,
        }),
      });
    } catch {
      // Fail-closed enrichment UX must not crash if audit endpoint is unavailable.
    }
  }

  function logStructured(payload) {
    console.info('[enrichment]', JSON.stringify(payload));
  }

  async function requestEnrichment(payload, endpoint) {
    const totalAttempts = ENRICHMENT_MAX_RETRIES + 1;
    for (let attempt = 1; attempt <= totalAttempts; attempt += 1) {
      try {
        const res = await fetchWithTimeout(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        }, ENRICHMENT_TIMEOUT_MS);

        const rawText = await res.text();
        let parsed;

        try {
          parsed = JSON.parse(rawText || '{}');
        } catch {
          if (looksTruncated(rawText)) {
            throw makeEnrichmentError('EnrichmentParseError', 'Truncated enrichment response', { partial: true });
          }
          throw makeEnrichmentError('EnrichmentParseError', 'Malformed enrichment response JSON');
        }

        const errorMessage = typeof parsed.error === 'string' ? parsed.error : '';

        if (res.status === 429 || /quota|rate\s*limit|billing/i.test(errorMessage)) {
          throw makeEnrichmentError('EnrichmentRateLimitError', errorMessage || 'Rate limit reached');
        }
        if (res.status >= 500) {
          throw makeEnrichmentError('EnrichmentUpstreamError', `HTTP ${res.status}`, { status: res.status, retryable: true });
        }
        if (res.status >= 400) {
          throw makeEnrichmentError('EnrichmentUpstreamError', `HTTP ${res.status}`, { status: res.status, retryable: false });
        }

        const validated = validateStructuredOutput(parsed);
        if (validated.status === 'partial') {
          return {
            status: 'partial',
            retryAction: 'retry',
            tokenUsage: null,
            model: ENRICHMENT_MODEL,
            errorClass: 'EnrichmentParseError',
          };
        }

        return {
          status: 'complete',
          suggestion: validated.suggestion,
          confidence: validated.confidence,
          tokenUsage: validated.tokenUsage,
          model: validated.model,
        };
      } catch (error) {
        const retryable = error?.name === 'EnrichmentTimeoutError'
          || error?.name === 'EnrichmentRateLimitError'
          || (error?.name === 'EnrichmentUpstreamError' && Number(error.status) >= 500);

        if (retryable && attempt < totalAttempts) {
          await sleep(backoffDelayMs(attempt));
          continue;
        }

        throw error;
      }
    }

    throw makeEnrichmentError('EnrichmentUpstreamError', 'Retry budget exhausted', { status: 503, retryable: false });
  }

  async function runEnrichment() {
    hideBanner();
    btnEnrich.disabled = true;
    const originalLabel = btnEnrich.innerHTML;
    btnEnrich.innerHTML = '<span class="spinner"></span> Enriching…';

    const requestId = buildRequestId();
    const endpoint = document.body.dataset.geminiEndpoint || GEMINI_ENDPOINT;
    const startedAt = Date.now();
    let auditStatus = 'unavailable';
    let auditErrorClass = null;
    let auditTokenUsage = null;

    try {
      const payload = {
        chiefComplaint: document.getElementById('chief-complaint').value,
        assessment: document.getElementById('assessment').value,
        plan: document.getElementById('plan').value,
      };

      const result = await requestEnrichment(payload, endpoint);
      auditTokenUsage = result.tokenUsage || null;

      if (result.status === 'partial') {
        auditStatus = 'partial';
        auditErrorClass = 'EnrichmentParseError';
        showError('AI enrichment partial', SAFE_UNAVAILABLE_MESSAGE, true);
        return;
      }

      if (result.confidence < ENRICHMENT_CONFIDENCE_THRESHOLD) {
        auditStatus = 'unavailable';
        showError('AI enrichment unavailable', SAFE_UNAVAILABLE_MESSAGE, false);
        return;
      }

      aiSuggestions.value = result.suggestion;
      aiSuggestions.classList.add('ai-populated');
      auditStatus = 'complete';
      showSuccess('Suggestions added to the AI Suggestions field below.');
    } catch (error) {
      const ui = mapErrorToUi(error);
      auditStatus = error?.partial ? 'partial' : 'unavailable';
      auditErrorClass = ui.errorClass;
      showError(ui.title, ui.message, ui.showRetry);
    } finally {
      const latencyMs = Date.now() - startedAt;
      const auditEntry = {
        requestId,
        model: ENRICHMENT_MODEL,
        latencyMs,
        tokenUsage: auditTokenUsage,
        errorClass: auditErrorClass,
        status: auditStatus,
      };

      logStructured({
        event: 'enrichment_call',
        ...auditEntry,
      });
      await writeAuditEntry(auditEntry);

      btnEnrich.disabled = false;
      btnEnrich.innerHTML = originalLabel;
    }
  }

  btnEnrich.addEventListener('click', runEnrichment);
  btnRetry.addEventListener('click', runEnrichment);

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (btnSave.disabled) return;
    form.dispatchEvent(new CustomEvent('crc:saved', {
      bubbles: true,
      detail: {
        patientId: document.getElementById('patient-id').value,
        encounterDate: document.getElementById('encounter-date').value,
        chiefComplaint: document.getElementById('chief-complaint').value,
        assessment: document.getElementById('assessment').value,
        plan: document.getElementById('plan').value,
        aiSuggestions: aiSuggestions.value,
      },
    }));
    alert('Case saved successfully.');
  });
</script>
</body>
</html>
